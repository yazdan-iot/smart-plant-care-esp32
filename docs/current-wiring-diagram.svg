<svg viewBox="0 0 1040 720" xmlns="http://www.w3.org/2000/svg" font-family="Tahoma, Arial, sans-serif">
  <rect x="0" y="0" width="1040" height="720" fill="#ffffff"/>

  <text x="20" y="30" font-size="18" font-weight="bold" fill="#222">Smart Plant Care — Current Wiring (Phase 1-4)</text>

  <!-- ESP32-S3 -->
  <rect x="30" y="200" width="170" height="400" rx="8" fill="#333333"/>
  <text x="115" y="235" font-size="18" fill="white" text-anchor="middle" font-weight="bold">ESP32-S3</text>
  <text x="115" y="255" font-size="13" fill="#cccccc" text-anchor="middle">WROOM-1</text>

  <!-- ESP32 pins -->
  <circle cx="200" cy="280" r="4" fill="#ffd166"/><text x="160" y="276" font-size="13" fill="white" text-anchor="end">3.3V</text>
  <circle cx="200" cy="320" r="4" fill="#ffd166"/><text x="160" y="316" font-size="13" fill="white" text-anchor="end">5V (VIN)</text>
  <circle cx="200" cy="360" r="4" fill="#9ad0f5"/><text x="160" y="356" font-size="13" fill="white" text-anchor="end">GND</text>
  <circle cx="200" cy="400" r="4" fill="#8fd19e"/><text x="160" y="396" font-size="13" fill="white" text-anchor="end">GPIO4</text>
  <circle cx="200" cy="440" r="4" fill="#8fd19e"/><text x="160" y="436" font-size="13" fill="white" text-anchor="end">GPIO6</text>
  <circle cx="200" cy="480" r="4" fill="#8fd19e"/><text x="160" y="476" font-size="13" fill="white" text-anchor="end">GPIO18</text>
  <circle cx="200" cy="520" r="4" fill="#8fd19e"/><text x="160" y="516" font-size="13" fill="white" text-anchor="end">GPIO15</text>

  <!-- Soil sensor module -->
  <rect x="300" y="60" width="210" height="110" rx="8" fill="#2d6a4f"/>
  <text x="405" y="90" font-size="15" fill="white" text-anchor="middle" font-weight="bold">Soil Moisture Sensor</text>
  <text x="405" y="108" font-size="12" fill="#cde8da" text-anchor="middle">(resistive, LM393 board)</text>
  <circle cx="300" cy="130" r="3.5" fill="#ffd166"/><text x="320" y="134" font-size="12" fill="white">VCC</text>
  <circle cx="300" cy="150" r="3.5" fill="#9ad0f5"/><text x="320" y="154" font-size="12" fill="white">GND</text>
  <circle cx="510" cy="130" r="3.5" fill="#8fd19e"/><text x="490" y="134" font-size="12" fill="white" text-anchor="end">AO</text>
  <circle cx="510" cy="150" r="3.5" fill="#888888"/><text x="490" y="154" font-size="11" fill="#ccc" text-anchor="end">DO (unused)</text>

  <!-- DHT22 -->
  <rect x="300" y="210" width="210" height="110" rx="8" fill="#2d6a4f"/>
  <text x="405" y="240" font-size="15" fill="white" text-anchor="middle" font-weight="bold">DHT22</text>
  <text x="405" y="258" font-size="12" fill="#cde8da" text-anchor="middle">air temperature / humidity</text>
  <circle cx="300" cy="280" r="3.5" fill="#ffd166"/><text x="320" y="284" font-size="12" fill="white">VCC</text>
  <circle cx="300" cy="300" r="3.5" fill="#9ad0f5"/><text x="320" y="304" font-size="12" fill="white">GND</text>
  <circle cx="510" cy="290" r="3.5" fill="#8fd19e"/><text x="490" y="294" font-size="12" fill="white" text-anchor="end">DATA</text>

  <!-- Pullup resistor for DHT22 -->
  <path d="M 470 260 l 5 -7 l 5 7 l 5 -7 l 5 7 l 5 -7 l 5 7" fill="none" stroke="#ffb703" stroke-width="1.6"/>
  <text x="440" y="248" font-size="11" fill="#333">R=10k&#937; (DATA&#8596;VCC)</text>

  <!-- Relay module -->
  <rect x="300" y="360" width="230" height="150" rx="8" fill="#6a4c93"/>
  <text x="415" y="390" font-size="15" fill="white" text-anchor="middle" font-weight="bold">Relay Module (5V)</text>
  <text x="415" y="408" font-size="11.5" fill="#e5d9f5" text-anchor="middle">control side only — load side not wired yet</text>
  <circle cx="300" cy="430" r="3.5" fill="#ffd166"/><text x="320" y="434" font-size="12" fill="white">VCC</text>
  <circle cx="300" cy="455" r="3.5" fill="#9ad0f5"/><text x="320" y="459" font-size="12" fill="white">GND</text>
  <circle cx="300" cy="480" r="3.5" fill="#8fd19e"/><text x="320" y="484" font-size="12" fill="white">IN</text>

  <circle cx="530" cy="430" r="3.5" fill="#999"/><text x="505" y="434" font-size="11" fill="#ccc" text-anchor="end">COM</text>
  <circle cx="530" cy="455" r="3.5" fill="#999"/><text x="505" y="459" font-size="11" fill="#ccc" text-anchor="end">NO</text>
  <circle cx="530" cy="480" r="3.5" fill="#999"/><text x="505" y="484" font-size="11" fill="#ccc" text-anchor="end">NC</text>
  <text x="415" y="530" font-size="11" fill="#f4c542" text-anchor="middle">&#9888; voltage drop under load — module suspected faulty</text>

  <!-- Wires: soil sensor -->
  <polyline points="200,440 250,440 250,130 300,130" fill="none" stroke="#ffb703" stroke-width="2"/>
  <polyline points="200,360 265,360 265,150 300,150" fill="none" stroke="#7fb8e0" stroke-width="2"/>
  <polyline points="200,400 280,400 280,130 300,130" fill="none" stroke="#6fcf85" stroke-width="2"/>

  <!-- Wires: DHT22 -->
  <polyline points="200,280 235,280 235,280 300,280" fill="none" stroke="#ffb703" stroke-width="2"/>
  <polyline points="200,360 245,360 245,300 300,300" fill="none" stroke="#7fb8e0" stroke-width="2"/>
  <polyline points="200,480 255,480 255,290 300,290" fill="none" stroke="#6fcf85" stroke-width="2"/>

  <!-- Wires: relay control -->
  <polyline points="200,320 270,320 270,430 300,430" fill="none" stroke="#ffb703" stroke-width="2"/>
  <polyline points="200,360 258,360 258,455 300,455" fill="none" stroke="#7fb8e0" stroke-width="2"/>
  <polyline points="200,520 285,520 285,480 300,480" fill="none" stroke="#6fcf85" stroke-width="2"/>

  <!-- Legend -->
  <rect x="30" y="630" width="16" height="16" fill="#ffb703"/><text x="52" y="643" font-size="12">Power (VCC / +)</text>
  <rect x="220" y="630" width="16" height="16" fill="#7fb8e0"/><text x="242" y="643" font-size="12">Ground (GND)</text>
  <rect x="400" y="630" width="16" height="16" fill="#6fcf85"/><text x="422" y="643" font-size="12">Signal / Data</text>
  <rect x="580" y="630" width="16" height="16" fill="#999999"/><text x="602" y="643" font-size="12">Not connected yet</text>

  <text x="20" y="685" font-size="13" fill="#555">Pump + external power circuit (relay load side) will be wired in Phase 7.</text>
</svg>
